<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شجرة عائلة الماجد</title>

<style>
:root{
  --bg:#f7f5f2;
  --card:#ffffffcc;
  --green:#063f2a;
  --green2:#0b5a3d;
  --gold:#c9a24a;
  --red:#dc2626;
}

*{box-sizing:border-box}

html,body{
  margin:0;
  width:100%;
  height:100%;
  font-family:Tahoma,Arial,sans-serif;
  background:var(--bg);
}

/* ===== الصفحة ===== */
.page{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  padding:10px;
  gap:12px;
}

/* ===== Desktop Header ===== */
.header{
  position:relative;
  height:130px;
  background:var(--card);
  border:1px solid rgba(201,162,74,.55);
  border-radius:18px;
  box-shadow:0 8px 24px rgba(0,0,0,.08);
}

.logo-box{
  position:absolute;
  right:20px;
  top:50%;
  transform:translateY(-50%);
}

.logo-box img{
  height:115px;
}

.center-box{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  text-align:center;
}

.title{
  margin:0;
  font-size:34px;
  font-weight:900;
  color:var(--green);
}

.gold-line{
  width:90px;
  height:3px;
  background:var(--gold);
  margin:8px auto;
}

.add-btn{
  display:inline-block;
  background:linear-gradient(135deg,var(--green),var(--green2));
  color:#fff;
  padding:10px 24px;
  border-radius:12px;
  text-decoration:none;
  font-weight:900;
}

.profile-card{
  position:absolute;
  left:20px;
  top:50%;
  transform:translateY(-50%);
  display:flex;
  gap:10px;
  align-items:center;
}

.profile-card img{
  width:70px;
  height:70px;
  border-radius:12px;
}

.profile-text{
  font-weight:800;
}

/* ===== Notice ===== */
.notice-card{
  background:var(--card);
  padding:14px;
  border-radius:16px;
  text-align:center;
}

.notice-main{
  font-weight:900;
  color:var(--green);
}

.notice-wait{
  display:block;
  margin-top:6px;
  color:var(--red);
  font-weight:900;
}

/* ===== Viewer ===== */
.viewer-wrap{
  flex:1;
}

.viewer{
  width:100%;
  height:100%;
  background:#d1d5db;
  border-radius:18px;
  overflow:hidden;
  position:relative;
}

.canvas{
  position:absolute;
}

.canvas img{
  max-width:none;
  pointer-events:none;
}

/* ===== Mobile ===== */
.mobile-header{display:none;}

@media(max-width:900px){

  .header{display:none;}

  .mobile-header{
    display:block;
    text-align:center;
    padding:12px;
  }

  .mobile-logo img{
    height:85px;
  }

  .mobile-title{
    font-size:26px;
    font-weight:900;
  }

  .mobile-add{
    margin:10px 0;
  }

  .mobile-profile{
    background:var(--card);
    padding:10px;
    border-radius:16px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
  }

  .mobile-profile img{
    width:70px;
    height:70px;
    border-radius:12px;
  }

  .viewer-wrap{
    height:360px;
  }
}
</style>
</head>

<body>

<div class="page">

<!-- Desktop -->
<div class="header">
  <div class="logo-box">
    <img src="logo.png">
  </div>

  <div class="center-box">
    <h1 class="title">شجرة عائلة الماجد</h1>
    <div class="gold-line"></div>
    <a class="add-btn" href="YOUR_LINK" target="_blank">
      + إضافة فرد أو صورة
    </a>
  </div>

  <div class="profile-card">
    <img src="profile.png">
    <div class="profile-text">
      إعداد: حسن علي أحمد الماجد<br>
      0563399984
    </div>
  </div>
</div>

<!-- Mobile -->
<div class="mobile-header">
  <div class="mobile-logo">
    <img src="logo.png">
  </div>

  <div class="mobile-title">شجرة عائلة الماجد</div>

  <div class="mobile-add">
    <a class="add-btn" href="YOUR_LINK" target="_blank">
      + إضافة فرد أو صورة
    </a>
  </div>

  <div class="mobile-profile">
    <img src="profile.png">
    <div>
      إعداد: حسن علي أحمد الماجد<br>
      0563399984
    </div>
  </div>
</div>

<!-- Notice -->
<div class="notice-card">
  <div class="notice-main">🔍 الرجاء تكبير الصورة لرؤية شجرة العائلة</div>
  <span class="notice-wait">⏱ الرجاء الانتظار قليلًا لظهور شجرة العائلة</span>
</div>

<!-- Viewer -->
<div class="viewer-wrap">
  <div class="viewer">

    <div id="loading" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#ffffffcc;font-weight:bold;">
      جاري التحميل...
    </div>

    <div class="canvas" id="canvas">
      <img id="treeImage" src="tree.png">
    </div>

  </div>
</div>

</div>

<script>
let scale=1,x=0,y=0;

function update(){
  document.getElementById("canvas").style.transform=
  `translate(${x}px,${y}px) scale(${scale})`;
}

document.getElementById("treeImage").onload=()=>{
  document.getElementById("loading").style.display="none";
};
</script>

</body>
</html>
