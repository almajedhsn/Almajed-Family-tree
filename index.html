<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شجرة عائلة الماجد</title>

<style>
:root{
  --bg:#e9e7e3;
  --brown:#c8a97e;
  --brown2:#b89563;
  --gold:#c9a24a;
  --red:#dc2626;
}

*{box-sizing:border-box}

html,body{
  margin:0;
  height:100%;
  font-family:Tahoma,Arial;
  background:var(--bg);
}

/* ===== HEADER ===== */
.header{
  position:relative;
  background:#fff;
  padding:20px;
  border-bottom:2px solid var(--gold);
}

/* 👇 الشعار (لابتوب) */
.logo-box{
  position:absolute;
  top:10px;
  right:20px;
}

.logo-box img{
  height:140px; /* تكبير */
}

/* العنوان */
.title-box{
  text-align:center;
}

.title{
  margin:0;
  font-size:32px;
  font-weight:900;
}

.add-btn{
  margin-top:10px;
  display:inline-block;
  background:linear-gradient(135deg,var(--brown),var(--brown2));
  color:#fff;
  padding:10px 20px;
  border-radius:10px;
  text-decoration:none;
  font-weight:bold;
}

/* البيانات */
.profile{
  position:absolute;
  left:20px;
  top:20px;
  display:flex;
  gap:10px;
  align-items:center;
}

.profile img{
  width:70px;
  height:70px;
  border-radius:10px;
}

/* ===== NOTICE ===== */
.notice{
  text-align:center;
  padding:10px;
  background:#fff;
}

.notice-wait{
  display:block;
  color:var(--red);
  margin-top:5px;
  font-weight:bold;
}

/* ===== VIEWER ===== */
.viewer{
  height:calc(100vh - 180px);
  background:#ccc;
  overflow:hidden;
  position:relative;
}

.canvas{
  position:absolute;
}

canvas img{
  pointer-events:none;
}

/* ===== MOBILE ===== */
@media(max-width:900px){

  .logo-box{
    position:static;
    text-align:center;
  }

  .logo-box img{
    height:120px;
  }

  .profile{
    position:static;
    justify-content:center;
    margin-top:10px;
  }

  .title{
    font-size:24px;
  }

}
</style>
</head>

<body>

<div class="header">

  <!-- الشعار -->
  <div class="logo-box">
    <img src="logo.png">
  </div>

  <!-- العنوان -->
  <div class="title-box">
    <h1 class="title">شجرة عائلة الماجد</h1>
    <a class="add-btn" href="YOUR_LINK" target="_blank">
      + إضافة فرد أو صورة
    </a>
  </div>

  <!-- بياناتك -->
  <div class="profile">
    <img src="profile.png">
    <div>
      إعداد: حسن علي أحمد الماجد<br>
      0563399984
    </div>
  </div>

</div>

<div class="notice">
  الرجاء تكبير الصورة لرؤية شجرة العائلة
  <span class="notice-wait">الرجاء الانتظار قليل لظهور شجرة العائلة</span>
</div>

<div class="viewer">
  <div class="canvas" id="canvas">
    <img id="treeImage" src="tree.png">
  </div>
</div>

<script>
let scale=1,x=0,y=0;

function update(){
  document.getElementById("canvas").style.transform=
  `translate(${x}px,${y}px) scale(${scale})`;
}

document.getElementById("treeImage").onload=()=>{
  console.log("تم تحميل الصورة");
};
</script>

</body>
</html>
