<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شجرة عائلة الماجد</title>

<style>
:root{
  --bg:#f7f5f2;
  --card:#ffffffcc;
  --green:#063f2a;
  --green2:#0b5a3d;
  --gold:#c9a24a;
  --red:#dc2626;
}

*{box-sizing:border-box}

html,body{
  margin:0;
  width:100%;
  height:100%;
  font-family:Tahoma,Arial,sans-serif;
  background:var(--bg);
  overflow:hidden;
}

.page{
  height:100vh;
  display:flex;
  flex-direction:column;
  padding:10px;
  gap:12px;
}

/* ===== Desktop Header ===== */
.header{
  position:relative;
  height:135px;
  background:var(--card);
  border:1px solid rgba(201,162,74,.55);
  border-radius:18px;
  box-shadow:0 8px 24px rgba(0,0,0,.08);
}

.logo-box{
  position:absolute;
  right:26px;
  top:50%;
  transform:translateY(-50%);
}

.logo-box img{
  height:115px;
  object-fit:contain;
}

.center-box{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  text-align:center;
}

.title{
  margin:0;
  font-size:36px;
  font-weight:900;
  color:var(--green);
}

.gold-line{
  width:95px;
  height:3px;
  background:var(--gold);
  margin:8px auto 12px;
  border-radius:99px;
}

.add-btn{
  display:inline-block;
  background:linear-gradient(135deg,var(--green),var(--green2));
  color:white;
  padding:12px 28px;
  border-radius:12px;
  text-decoration:none;
  font-weight:900;
  font-size:16px;
  box-shadow:0 5px 14px rgba(6,63,42,.28);
}

.profile-card{
  position:absolute;
  left:22px;
  top:50%;
  transform:translateY(-50%);
  display:flex;
  align-items:center;
  gap:12px;
  direction:rtl;
}

.profile-card img{
  width:82px;
  height:82px;
  border-radius:14px;
  object-fit:cover;
  border:2px solid rgba(201,162,74,.55);
}

.profile-text{
  text-align:right;
  font-weight:800;
  line-height:1.8;
  white-space:nowrap;
}

.profile-phone{
  color:var(--green);
}

/* ===== Notice ===== */
.notice-card{
  background:var(--card);
  border-radius:16px;
  padding:16px 10px;
  text-align:center;
  box-shadow:0 4px 14px rgba(0,0,0,.05);
}

.notice-main{
  font-size:18px;
  font-weight:900;
  color:var(--green);
}

.notice-wait{
  display:block;
  margin-top:8px;
  font-size:17px;
  font-weight:900;
  color:var(--red);
}

/* ===== Viewer ===== */
.viewer-wrap{
  flex:1;
  min-height:0;
}

.viewer{
  position:relative;
  width:100%;
  height:100%;
  overflow:hidden;
  background:#d1d5db;
  border-radius:18px;
  border:1px solid rgba(0,0,0,.15);
  box-shadow:0 8px 24px rgba(0,0,0,.12);
  cursor:grab;
  touch-action:none;
}

.viewer.dragging{cursor:grabbing}

.canvas{
  position:absolute;
  top:0;
  left:0;
  transform-origin:top left;
}

.canvas img{
  display:block;
  max-width:none;
  user-select:none;
  pointer-events:none;
  -webkit-user-drag:none;
}

.loading-box{
  position:absolute;
  inset:0;
  z-index:5;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(255,255,255,.8);
  color:var(--green);
  font-weight:900;
}

.zoom-panel{
  position:absolute;
  left:18px;
  bottom:18px;
  z-index:20;
  display:flex;
  align-items:center;
  gap:10px;
  direction:ltr;
  background:white;
  padding:8px;
  border-radius:14px;
  box-shadow:0 5px 16px rgba(0,0,0,.20);
}

.zoom-btn{
  width:42px;
  height:38px;
  border:none;
  border-radius:10px;
  background:var(--green);
  color:white;
  font-size:22px;
  font-weight:900;
  cursor:pointer;
}

.zoom-percent{
  min-width:58px;
  text-align:center;
  font-weight:900;
  color:var(--green);
}

/* ===== Mobile ===== */
.mobile-header{display:none}

@media(max-width:900px){

  html,body{
    overflow:auto;
  }

  .page{
    height:auto;
    min-height:100vh;
    padding:0;
    gap:0;
  }

  .header{
    display:none;
  }

  .mobile-header{
    display:block;
    padding:28px 18px 24px;
    background:var(--bg);
    text-align:center;
  }

  .mobile-logo img{
    height:125px;
    object-fit:contain;
    margin-bottom:18px;
  }

  .mobile-title{
    margin:0 0 18px;
    font-size:32px;
    font-weight:900;
    color:#111;
  }

  .mobile-add{
    margin-bottom:22px;
  }

  .mobile-add .add-btn{
    font-size:22px;
    padding:18px 34px;
    border-radius:16px;
  }

  .mobile-profile{
    background:var(--card);
    border-radius:26px;
    padding:18px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:16px;
    box-shadow:0 6px 18px rgba(0,0,0,.10);
  }

  .mobile-profile img{
    width:100px;
    height:100px;
    border-radius:18px;
    object-fit:cover;
  }

  .mobile-profile-text{
    font-size:21px;
    font-weight:800;
    line-height:1.6;
  }

  .notice-card{
    margin:14px 18px;
    padding:18px 10px;
    border-radius:18px;
  }

  .notice-main,
  .notice-wait{
    font-size:20px;
  }

  .viewer-wrap{
    height:430px;
    padding:0 10px 12px;
  }

  .viewer{
    border-radius:16px;
  }

  .zoom-panel{
    left:14px;
    bottom:14px;
  }
}
</style>
</head>

<body>

<div class="page">

  <!-- Desktop -->
  <header class="header">
    <div class="logo-box">
      <img src="logo.png" alt="ALMAJED FAMILY">
    </div>

    <div class="center-box">
      <h1 class="title">شجرة عائلة الماجد</h1>
      <div class="gold-line"></div>
      <a class="add-btn"
         href="https://script.google.com/macros/s/AKfycbz9L0Vr_g5Lh1u21R2MSzlewGH0V7ZH8Sbd6EByEH1Dc5GBzmSUm-xsIc7obUat5XaC/exec"
         target="_blank">
        + إضافة فرد أو صورة
      </a>
    </div>

    <div class="profile-card">
      <img src="profile.png" alt="حسن علي أحمد الماجد">
      <div class="profile-text">
        <div>إعداد: حسن علي أحمد الماجد</div>
        <div class="profile-phone">رقم التواصل: 0563399984</div>
      </div>
    </div>
  </header>

  <!-- Mobile -->
  <section class="mobile-header">
    <div class="mobile-logo">
      <img src="logo.png" alt="ALMAJED FAMILY">
    </div>

    <h1 class="mobile-title">شجرة عائلة الماجد</h1>

    <div class="mobile-add">
      <a class="add-btn"
         href="https://script.google.com/macros/s/AKfycbz9L0Vr_g5Lh1u21R2MSzlewGH0V7ZH8Sbd6EByEH1Dc5GBzmSUm-xsIc7obUat5XaC/exec"
         target="_blank">
        + إضافة فرد أو صورة
      </a>
    </div>

    <div class="mobile-profile">
      <div class="mobile-profile-text">
        <div>إعداد: حسن علي أحمد الماجد</div>
        <div>رقم التواصل: 0563399984</div>
      </div>
      <img src="profile.png" alt="حسن علي أحمد الماجد">
    </div>
  </section>

  <div class="notice-card">
    <div class="notice-main">🔍 الرجاء تكبير الصورة لرؤية شجرة العائلة</div>
    <span class="notice-wait">⏱ الرجاء الانتظار قليلًا لظهور شجرة العائلة</span>
  </div>

  <main class="viewer-wrap">
    <div class="viewer" id="viewer">

      <div class="loading-box" id="loadingBox">جاري تحميل شجرة العائلة...</div>

      <div class="canvas" id="canvas">
        <img id="treeImage" src="tree.png" alt="شجرة عائلة الماجد">
      </div>

      <div class="zoom-panel">
        <button class="zoom-btn" id="zoomOutBtn">−</button>
        <div class="zoom-percent" id="zoomPercent">100%</div>
        <button class="zoom-btn" id="zoomInBtn">+</button>
      </div>

    </div>
  </main>

</div>

<script>
const viewer = document.getElementById("viewer");
const canvas = document.getElementById("canvas");
const img = document.getElementById("treeImage");
const loadingBox = document.getElementById("loadingBox");
const zoomPercent = document.getElementById("zoomPercent");

let scale = 1;
let translateX = 0;
let translateY = 0;
let isDragging = false;
let startX = 0;
let startY = 0;
let lastTouchDistance = null;

function updateTransform(){
  canvas.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
  zoomPercent.textContent = Math.round(scale * 100) + "%";
}

function fitImage(){
  const rect = viewer.getBoundingClientRect();
  if(!img.naturalWidth || !img.naturalHeight) return;

  const scaleX = rect.width / img.naturalWidth;
  const scaleY = rect.height / img.naturalHeight;

  scale = Math.min(scaleX, scaleY);

  const imgW = img.naturalWidth * scale;
  const imgH = img.naturalHeight * scale;

  translateX = (rect.width - imgW) / 2;
  translateY = (rect.height - imgH) / 2;

  updateTransform();
}

function zoomAtPoint(factor, clientX, clientY){
  const rect = viewer.getBoundingClientRect();
  const px = clientX - rect.left;
  const py = clientY - rect.top;

  const worldX = (px - translateX) / scale;
  const worldY = (py - translateY) / scale;

  scale *= factor;
  if(scale < 0.03) scale = 0.03;
  if(scale > 12) scale = 12;

  translateX = px - worldX * scale;
  translateY = py - worldY * scale;

  updateTransform();
}

document.getElementById("zoomInBtn").onclick = () => {
  const r = viewer.getBoundingClientRect();
  zoomAtPoint(1.2, r.left + r.width / 2, r.top + r.height / 2);
};

document.getElementById("zoomOutBtn").onclick = () => {
  const r = viewer.getBoundingClientRect();
  zoomAtPoint(1 / 1.2, r.left + r.width / 2, r.top + r.height / 2);
};

viewer.addEventListener("wheel", e => {
  e.preventDefault();
  zoomAtPoint(e.deltaY < 0 ? 1.1 : 1 / 1.1, e.clientX, e.clientY);
},{passive:false});

viewer.addEventListener("mousedown", e => {
  isDragging = true;
  startX = e.clientX - translateX;
  startY = e.clientY - translateY;
  viewer.classList.add("dragging");
});

window.addEventListener("mousemove", e => {
  if(!isDragging) return;
  translateX = e.clientX - startX;
  translateY = e.clientY - startY;
  updateTransform();
});

window.addEventListener("mouseup", () => {
  isDragging = false;
  viewer.classList.remove("dragging");
});

viewer.addEventListener("touchstart", e => {
  if(e.touches.length === 1){
    const t = e.touches[0];
    isDragging = true;
    startX = t.clientX - translateX;
    startY = t.clientY - translateY;
  }

  if(e.touches.length === 2){
    lastTouchDistance = Math.hypot(
      e.touches[1].clientX - e.touches[0].clientX,
      e.touches[1].clientY - e.touches[0].clientY
    );
  }
},{passive:false});

viewer.addEventListener("touchmove", e => {
  e.preventDefault();

  if(e.touches.length === 1 && isDragging){
    const t = e.touches[0];
    translateX = t.clientX - startX;
    translateY = t.clientY - startY;
    updateTransform();
  }

  if(e.touches.length === 2){
    const distance = Math.hypot(
      e.touches[1].clientX - e.touches[0].clientX,
      e.touches[1].clientY - e.touches[0].clientY
    );

    if(lastTouchDistance){
      const factor = distance / lastTouchDistance;
      const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
      const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
      zoomAtPoint(factor, midX, midY);
    }

    lastTouchDistance = distance;
  }
},{passive:false});

viewer.addEventListener("touchend", () => {
  isDragging = false;
  lastTouchDistance = null;
});

img.onload = () => {
  loadingBox.style.display = "none";
  setTimeout(fitImage, 80);
};

img.onerror = () => {
  loadingBox.innerHTML = "تعذر تحميل صورة شجرة العائلة<br>تأكد أن اسم الملف tree.png";
};

window.addEventListener("resize", fitImage);

document.addEventListener("contextmenu", e => e.preventDefault());
document.addEventListener("dragstart", e => e.preventDefault());
</script>

</body>
</html>
