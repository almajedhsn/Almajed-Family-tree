<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>شجرة عائلة الماجد</title>

<style>
:root{
  --green:#063f2a;
  --green2:#0b5a3d;
  --gold:#c9a24a;
  --bg:#f6f4ef;
  --card:#ffffff;
  --text:#14231b;
  --muted:#647067;
  --red:#dc2626;
}

*{ box-sizing:border-box; }

html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:Tahoma, Arial, sans-serif;
  background:var(--bg);
}

/* ===== HEADER ===== */
.header{
  background:#fff;
  border-bottom:3px solid rgba(201,162,74,.45);
  box-shadow:0 6px 18px rgba(0,0,0,.08);
  padding:12px 18px;
}

.header-inner{
  display:grid;
  grid-template-columns:260px 1fr 260px;
  align-items:center;
}

.logo-box img{ height:80px; }

.center-box{ text-align:center; }

.title{
  margin:0;
  font-size:30px;
  font-weight:900;
  color:var(--green);
}

.add-btn{
  margin-top:10px;
  display:inline-block;
  background:var(--green);
  color:#fff;
  padding:10px 20px;
  border-radius:10px;
  text-decoration:none;
  font-weight:bold;
}

.profile-card{
  display:flex;
  align-items:center;
  gap:10px;
  justify-content:flex-end;
}

.profile-card img{
  width:70px;
  height:70px;
  border-radius:10px;
}

/* ===== NOTICE ===== */
.notice{
  text-align:center;
  padding:10px;
  background:#fff;
  border-bottom:1px solid #ddd;
}

.notice-wait{
  display:block;
  color:red;
  margin-top:5px;
  font-weight:bold;
}

/* ===== VIEWER ===== */
.viewer{
  height:calc(100vh - 160px);
  background:#ccc;
  position:relative;
  overflow:hidden;
}

.canvas{
  position:absolute;
  top:0;
  left:0;
  transform-origin:top left;
}

.canvas img{
  user-select:none;
  pointer-events:none;
}

/* ===== LOADING ===== */
.loading{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#ffffffcc;
  font-weight:bold;
}

/* ===== ZOOM ===== */
.zoom{
  position:absolute;
  bottom:10px;
  left:10px;
}

button{
  padding:6px 10px;
  font-size:18px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="header-inner">

    <div class="logo-box">
      <img src="logo.png">
    </div>

    <div class="center-box">
      <h1 class="title">شجرة عائلة الماجد</h1>
      <a class="add-btn" href="https://script.google.com/macros/s/AKfycbz9L0Vr_g5Lh1u21R2MSzlewGH0V7ZH8Sbd6EByEH1Dc5GBzmSUm-xsIc7obUat5XaC/exec" target="_blank">
        + إضافة فرد أو صورة
      </a>
    </div>

    <div class="profile-card">
      <img src="profile.png">
      <div>
        إعداد: حسن علي أحمد الماجد<br>
        0563399984
      </div>
    </div>

  </div>
</div>

<!-- NOTICE -->
<div class="notice">
  الرجاء تكبير الصورة لرؤية شجرة العائلة
  <span class="notice-wait">الرجاء الانتظار قليل لظهور شجرة العائلة</span>
</div>

<!-- VIEWER -->
<div class="viewer" id="viewer">

  <div class="loading" id="loading">جاري تحميل الشجرة...</div>

  <div class="canvas" id="canvas">
    <!-- 👇 هنا التعديل إلى tree.png -->
    <img id="treeImage" src="tree.png">
  </div>

  <div class="zoom">
    <button onclick="zoomIn()">+</button>
    <button onclick="zoomOut()">-</button>
  </div>

</div>

<script>
let scale=1, x=0, y=0;

const canvas=document.getElementById("canvas");
const img=document.getElementById("treeImage");
const loading=document.getElementById("loading");

function update(){
  canvas.style.transform=`translate(${x}px,${y}px) scale(${scale})`;
}

function zoomIn(){ scale*=1.2; update(); }
function zoomOut(){ scale/=1.2; update(); }

img.onload=()=>{
  loading.style.display="none";
};

document.getElementById("viewer").addEventListener("mousedown",e=>{
  let startX=e.clientX-x;
  let startY=e.clientY-y;

  function move(ev){
    x=ev.clientX-startX;
    y=ev.clientY-startY;
    update();
  }

  function up(){
    window.removeEventListener("mousemove",move);
    window.removeEventListener("mouseup",up);
  }

  window.addEventListener("mousemove",move);
  window.addEventListener("mouseup",up);
});

/* منع حفظ الصورة */
document.addEventListener("contextmenu",e=>e.preventDefault());
</script>

</body>
</html>
