<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شجرة عائلة الماجد</title>

<!-- 🚀 تسريع تحميل الصورة -->
<link rel="preload" as="image" href="./tree.png">

<style>
:root{
  --bg:#f7f5f2;
  --card:#ffffffcc;
  --green:#063f2a;
  --green2:#0b5a3d;
  --gold:#c9a24a;
  --red:#dc2626;
}

*{box-sizing:border-box}

html,body{
  margin:0;
  width:100%;
  height:100%;
  font-family:Tahoma,Arial,sans-serif;
  background:var(--bg);
}

/* ===== الصفحة ===== */
.page{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  padding:10px;
  gap:12px;
}

/* ===== Desktop Header ===== */
.header{
  position:relative;
  height:135px;
  background:var(--card);
  border:1px solid rgba(201,162,74,.55);
  border-radius:18px;
  box-shadow:0 8px 24px rgba(0,0,0,.08);
}

.logo-box{
  position:absolute;
  right:26px;
  top:50%;
  transform:translateY(-50%);
}

.logo-box img{
  height:115px;
}

.center-box{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  text-align:center;
}

.title{
  margin:0;
  font-size:36px;
  font-weight:900;
  color:var(--green);
}

.gold-line{
  width:95px;
  height:3px;
  background:var(--gold);
  margin:8px auto 12px;
}

.add-btn{
  display:inline-block;
  background:linear-gradient(135deg,var(--green),var(--green2));
  color:white;
  padding:12px 28px;
  border-radius:12px;
  text-decoration:none;
  font-weight:900;
}

.profile-card{
  position:absolute;
  left:22px;
  top:50%;
  transform:translateY(-50%);
  display:flex;
  align-items:center;
  gap:12px;
}

.profile-card img{
  width:80px;
  height:80px;
  border-radius:14px;
}

/* ===== Notice ===== */
.notice-card{
  background:var(--card);
  border-radius:16px;
  padding:14px;
  text-align:center;
}

.notice-main{
  font-weight:900;
  color:var(--green);
}

.notice-wait{
  display:block;
  margin-top:6px;
  color:var(--red);
  font-weight:900;
}

/* ===== Viewer ===== */
.viewer{
  position:relative;
  width:100%;
  height:60vh;
  background:#d1d5db;
  border-radius:18px;
  overflow:hidden;
}

.canvas{
  position:absolute;
}

.canvas img{
  max-width:none;
  pointer-events:none;
}

/* ===== Mobile ===== */
@media(max-width:900px){

  .header{display:none;}

  .viewer{
    height:360px;
  }
}
</style>
</head>

<body>

<div class="page">

<!-- Desktop -->
<div class="header">
  <div class="logo-box">
    <img src="./logo.png">
  </div>

  <div class="center-box">
    <h1 class="title">شجرة عائلة الماجد</h1>
    <div class="gold-line"></div>
    <a class="add-btn" href="YOUR_LINK" target="_blank">
      + إضافة فرد أو صورة
    </a>
  </div>

  <div class="profile-card">
    <img src="./profile.png">
    <div>
      إعداد: حسن علي أحمد الماجد<br>
      0563399984
    </div>
  </div>
</div>

<!-- Notice -->
<div class="notice-card">
  <div class="notice-main">🔍 الرجاء تكبير الصورة لرؤية شجرة العائلة</div>
  <span class="notice-wait">⏱ الرجاء الانتظار قليلًا لظهور شجرة العائلة</span>
</div>

<!-- Viewer -->
<div class="viewer">

  <div id="loading" style="
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#ffffffcc;
    font-weight:bold;">
    جاري تحميل الشجرة...
  </div>

  <div class="canvas">
    <img
      id="treeImage"
      src="./tree.png"
      alt="شجرة العائلة"
      decoding="async"
      fetchpriority="high"
      draggable="false">
  </div>

</div>

</div>

<script>
const img = document.getElementById("treeImage");
const loading = document.getElementById("loading");

img.onload = () => {
  loading.style.display = "none";
};

img.onerror = () => {
  loading.innerHTML = "❌ لم يتم العثور على الصورة<br>تأكد من اسم tree.png";
};
</script>

</body>
</html>
